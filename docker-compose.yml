services:
  db:
    image: postgres:16-alpine
    container_name: llm-chat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: llm_chat
    ports:
      # Host 5434 avoids clashing with a local Postgres already on 5432
      - "5434:5432"
    volumes:
      - llm_chat_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d llm_chat"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: llm-chat-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - apps/server/.env
    environment:
      # Override host URL from .env so the container talks to the compose service
      DATABASE_URL: postgresql://postgres:postgres@db:5432/llm_chat?schema=public
      HOST: 0.0.0.0
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  llm_chat_pgdata:
